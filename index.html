<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATOMIC TETRIS: PROTOCOL 7</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --atomic-red: #ff2a2a;
            --atomic-gold: #ffcc00;
            --atomic-dark: #1a0505;
            --atomic-panel: #2b1111;
            --neon-glow: 0 0 10px var(--atomic-red), 0 0 20px var(--atomic-red);
            --glass-bg: rgba(20, 5, 5, 0.95);
        }

        body {
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 50% 50%, #2a0000 0%, #000 100%),
                repeating-linear-gradient(0deg, transparent 0px, transparent 2px, #000 3px),
                repeating-linear-gradient(90deg, transparent 0px, transparent 2px, #000 3px);
            background-size: 100% 100%, 4px 4px, 4px 4px;
            color: var(--atomic-gold);
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none; /* Запрет выделения текста */
        }

        /* Контейнер */
        .container {
            position: relative;
            border: 4px solid var(--atomic-red);
            padding: 15px;
            background: var(--glass-bg);
            box-shadow: 0 0 30px rgba(255, 42, 42, 0.3);
            border-radius: 10px;
        }

        /* углы */
        .corner-decor {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        .corner-decor::before, .corner-decor::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            border: 3px solid var(--atomic-gold);
            transition: all 0.3s;
        }
        .corner-decor::before { top: -3px; left: -3px; border-right: none; border-bottom: none; }
        .corner-decor::after { bottom: -3px; right: -3px; border-left: none; border-top: none; }

        h1 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0 0 15px 0;
            text-shadow: var(--neon-glow);
            font-size: 1.5rem;
            border-bottom: 2px solid var(--atomic-gold);
            padding-bottom: 5px;
        }

        .game-layout {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        canvas {
            border: 2px solid var(--atomic-gold);
            background-color: rgba(0, 0, 0, 0.8);
            box-shadow: inset 0 0 20px #000;
            display: block;
        }

        /* Правая панель (UI) */
        .ui-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100px; /* Фиксированная ширина для панели */
        }

        .stat-box {
            background: var(--atomic-panel);
            border: 1px solid var(--atomic-gold);
            padding: 10px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        .stat-label {
            font-size: 0.6rem;
            color: #aaa;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.2rem;
            color: var(--atomic-red);
            text-shadow: 0 0 5px var(--atomic-red);
        }

        #next-piece-canvas {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            border: 1px solid #552222;
            background: rgba(0,0,0,0.5);
        }

        /* mobile */
        .mobile-controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 20px;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .control-group {
            display: flex;
            gap: 15px;
        }

        .ctrl-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 42, 42, 0.1);
            border: 2px solid var(--atomic-red);
            color: var(--atomic-gold);
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 42, 42, 0.2);
            transition: 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .ctrl-btn:active {
            background: var(--atomic-red);
            color: #fff;
            transform: scale(0.95);
            box-shadow: 0 0 20px var(--atomic-red);
        }

        /* Оверлей Game Over */
        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            border: 2px solid var(--atomic-red);
            padding: 30px;
            text-align: center;
            display: none;
            z-index: 10;
            width: 80%;
            box-shadow: 0 0 50px rgba(255, 42, 42, 0.5);
        }

        .btn {
            background: transparent;
            color: var(--atomic-gold);
            border: 1px solid var(--atomic-gold);
            padding: 10px 20px;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
            transition: 0.2s;
            font-size: 1rem;
        }

        .btn:hover {
            background: var(--atomic-red);
            color: white;
            box-shadow: var(--neon-glow);
        }

        /* Анимация */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: rgba(255, 42, 42, 0.2);
            animation: scan 5s linear infinite;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes scan {
            0% { top: -5%; }
            100% { top: 105%; }
        }

        /* Адаптивность для маленьких экранов */
        @media (max-width: 450px) {
            .container { padding: 10px; }
            canvas { width: 200px; height: 333px; } /* Уменьшаем канвас физически, но логика та же */
            h1 { font-size: 1.2rem; }
            .ui-panel { width: 80px; }
            .stat-value { font-size: 1rem; }
            #next-piece-canvas { width: 60px; height: 60px; }
            .ctrl-btn { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <div class="container">
        <div class="corner-decor"></div>
        <h1>ATOMIC TETRIS</h1>
        
        <div class="game-layout">
            <!-- Основное поле -->
            <canvas id="tetris" width="240" height="400"></canvas>
            
            <!-- Правая колонка -->
            <div class="ui-panel">
                <div class="stat-box">
                    <div class="stat-label">СЛЕДУЮЩИЙ</div>
                    <canvas id="next-piece-canvas" width="80" height="80"></canvas>
                </div>
                <div class="stat-box">
                    <div class="stat-label">СЧЁТ</div>
                    <div id="score" class="stat-value">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">УРОВЕНЬ</div>
                    <div id="level" class="stat-value">1</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">СТАТУС</div>
                    <div id="status" class="stat-value" style="font-size: 0.8rem; color: var(--atomic-gold);">ОНЛАЙН</div>
                </div>
            </div>
        </div>

        <!-- Мобильное управление -->
        <div class="mobile-controls">
            <div class="control-group">
                <div class="ctrl-btn" id="btn-left">◀</div>
                <div class="ctrl-btn" id="btn-right">▶</div>
            </div>
            <div class="control-group">
                <div class="ctrl-btn" id="btn-rotate">↻</div>
                <div class="ctrl-btn" id="btn-down">▼</div>
            </div>
        </div>

        <div id="gameOverMsg" class="message">
            <h2 style="color: var(--atomic-red)">СИСТЕМА ОТКЛЮЧЕНА</h2>
            <p>Итоговый счёт: <span id="finalScore">0</span></p>
            <button class="btn" onclick="resetGame()">ПЕРЕЗАГРУЗКА</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next-piece-canvas');
        const nextContext = nextCanvas.getContext('2d');
        
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const gameOverMsg = document.getElementById('gameOverMsg');
        const finalScoreElement = document.getElementById('finalScore');

        // Масштабирование: 20px на блок
        context.scale(20, 20);
        nextContext.scale(20, 20);

        // Цветовая палитра Atomic Heart
        const colors = [
            null,
            '#FF3333', // Красный
            '#FFD700', // Золотой
            '#00BFFF', // Голубой
            '#32CD32', // Зеленый
            '#9370DB', // Фиолетовый
            '#FF8C00', // Оранжевый
            '#DC143C', // Темно-красный
        ];

        // Создание фигур
        function createPiece(type) {
            if (type === 'I') {
                return [
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                ];
            } else if (type === 'L') {
                return [
                    [0, 2, 0],
                    [0, 2, 0],
                    [0, 2, 2],
                ];
            } else if (type === 'J') {
                return [
                    [0, 3, 0],
                    [0, 3, 0],
                    [3, 3, 0],
                ];
            } else if (type === 'O') {
                return [
                    [4, 4],
                    [4, 4],
                ];
            } else if (type === 'Z') {
                return [
                    [5, 5, 0],
                    [0, 5, 5],
                    [0, 0, 0],
                ];
            } else if (type === 'S') {
                return [
                    [0, 6, 6],
                    [6, 6, 0],
                    [0, 0, 0],
                ];
            } else if (type === 'T') {
                return [
                    [0, 7, 0],
                    [7, 7, 7],
                    [0, 0, 0],
                ];
            }
        }

        // Создание матрицы поля
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        // Отрисовка основного поля
        function draw() {
            // Очистка фона
            context.fillStyle = '#1a0505';
            context.fillRect(0, 0, canvas.width, canvas.height);

            drawMatrix(arena, {x: 0, y: 0}, context);
            drawMatrix(player.matrix, player.pos, context);
        }

        // Отрисовка следующей фигуры
        function drawNext() {
            nextContext.fillStyle = '#000';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            // Центрирование фигуры в маленьком окне (4x4 блока)
            const offset = {
                x: (4 - nextPiece.length) / 2,
                y: (4 - nextPiece.length) / 2
            };
            drawMatrix(nextPiece, offset, nextContext);
        }

        // Универсальная функция отрисовки матрицы
        function drawMatrix(matrix, offset, ctx) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        
                        // Стилизация блока
                        ctx.lineWidth = 0.05;
                        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);

                        // Блик
                        ctx.fillStyle = 'rgba(255,255,255,0.3)';
                        ctx.fillRect(x + offset.x + 0.1, y + offset.y + 0.1, 0.3, 0.3);
                    }
                });
            });
        }

        // Слияние фигуры с полем
        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        // Поворот
        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [
                        matrix[x][y],
                        matrix[y][x],
                    ] = [
                        matrix[y][x],
                        matrix[x][y],
                    ];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        // Проверка столкновений
        function collide(arena, player) {
            const m = player.matrix;
            const o = player.pos;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] &&
                        arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        // Очистка линий
        function arenaSweep() {
            let rowCount = 0;
            outer: for (let y = arena.length -1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }

                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                rowCount++;
            }

            if (rowCount > 0) {
                // 100 очков за каждый снесенный ряд
                player.score += rowCount * 100;
                updateScore();
            }
        }

        let nextPiece = null;

        // Сброс игрока
        function playerReset() {
            const pieces = 'ILJOTSZ';
            
            // Если следующей фигуры нет (старт игры), создаем её
            if (nextPiece === null) {
                nextPiece = createPiece(pieces[pieces.length * Math.random() | 0]);
            }

            // Текущая фигура становится следующей
            player.matrix = nextPiece;
            // Генерируем новую следующую фигуру
            nextPiece = createPiece(pieces[pieces.length * Math.random() | 0]);
            drawNext();

            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) -
                           (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                gameOver();
            }
        }

        function gameOver() {
            isGameOver = true;
            gameOverMsg.style.display = 'block';
            finalScoreElement.innerText = player.score;
            document.getElementById('status').innerText = "ОТКЛЮЧЕН";
            document.getElementById('status').style.color = "red";
        }

        function resetGame() {
            arena.forEach(row => row.fill(0));
            player.score = 0;
            player.level = 1;
            nextPiece = null;
            updateScore();
            isGameOver = false;
            gameOverMsg.style.display = 'none';
            document.getElementById('status').innerText = "ОНЛАЙН";
            document.getElementById('status').style.color = "var(--atomic-gold)";
            playerReset();
            update();
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function updateScore() {
            scoreElement.innerText = player.score;
            // Повышение уровня каждые 500 очков
            player.level = Math.floor(player.score / 500) + 1;
            levelElement.innerText = player.level;
            
            // Базовая скорость 1000мс, уменьшаем на 50мс за каждый уровень
            // Минимальная задержка 100мс
            dropInterval = Math.max(100, 1000 - (player.level - 1) * 50); 
        }

        // Игровой цикл
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let isGameOver = false;

        function update(time = 0) {
            if (isGameOver) return;

            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            requestAnimationFrame(update);
        }

        const arena = createMatrix(12, 20);

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
            level: 1,
        };

        // Управление клавиатурой
        document.addEventListener('keydown', event => {
            if (isGameOver) return;

            if (event.keyCode === 37) { // Влево
                playerMove(-1);
            } else if (event.keyCode === 39) { // Вправо
                playerMove(1);
            } else if (event.keyCode === 40) { // Вниз
                playerDrop();
            } else if (event.keyCode === 81) { // Q - поворот влево
                playerRotate(-1);
            } else if (event.keyCode === 87 || event.keyCode === 38) { // W или Вверх - поворот вправо
                playerRotate(1);
            }
        });

        // Управление для телефонов (Touch events)
        function addTouchListener(id, action) {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault(); // Предотвращаем зум и скролл
                if (!isGameOver) action();
            });
            // Для мыши на ПК (тестирование кнопок)
            btn.addEventListener('mousedown', (e) => {
                if (!isGameOver) action();
            });
        }

        addTouchListener('btn-left', () => playerMove(-1));
        addTouchListener('btn-right', () => playerMove(1));
        addTouchListener('btn-down', () => playerDrop());
        addTouchListener('btn-rotate', () => playerRotate(1));

        // Старт
        playerReset();
        updateScore();
        update();

    </script>
</body>
</html>
